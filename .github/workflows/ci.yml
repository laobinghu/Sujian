name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送版本标签时触发，如 v1.0.0
  release:
    types: [created]  # 当创建release时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限以上传release资产

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 根据项目需求调整
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10'  # 与项目packageManager版本一致

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp -r .output/public/* release/
          # 如果需要，可以添加其他文件
          # cp package.json release/
          # cp README.md release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')  # 仅在标签推送时上传
        with:
          files: |
            release/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
