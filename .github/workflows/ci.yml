name: Build and Release

on:
  push:
    branches:
      - '**'  # 所有分支推送都触发
    tags:
      - 'v*'  # 当推送版本标签时触发，如 v1.0.0
  release:
    types: [created]  # 当创建release时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限以上传release资产

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp -r .output/public/* release/
          cd release
          zip -r ../sujian-build.zip .
          cd ..

      - name: Create Preview Release
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}  # 仅在分支推送时创建预览release
        uses: softprops/action-gh-release@v1
        with:
          name: "Preview - ${{ github.ref_name }} (${{ github.sha }})"
          tag_name: "preview-${{ github.ref_name }}-${{ github.run_number }}"
          body: |
            ## 预览版本
            - 分支: `${{ github.ref_name }}`
            - 提交: `${{ github.sha }}`
            - 运行号: `${{ github.run_number }}`
            - 时间: ${{ github.event.head_commit.timestamp }}

            此版本为自动构建的预览版本，仅供测试使用。
          prerelease: true
          generate_release_notes: false
          files: |
            sujian-build.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')  # 仅在标签推送时上传
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sujian-build.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
